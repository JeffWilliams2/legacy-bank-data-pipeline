# profiles.yml
# -----------------------------------------------------------------------------
# Two targets are defined:
#   - dev  : DuckDB, runs locally with ZERO cloud setup. This is the default.
#   - prod : Snowflake. Uncomment and fill in to run the SAME models in the
#            cloud. Nothing about the models changes — only this connection.
#
# This is the whole point of dbt: warehouse-portable transformations.
# -----------------------------------------------------------------------------
legacy_bank_pipeline:
  target: dev
  outputs:

    dev:
      type: duckdb
      path: "warehouse.duckdb"
      threads: 4

